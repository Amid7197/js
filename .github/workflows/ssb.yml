name: ssb
on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
  schedule:
    - cron: '0 21 * * *'

permissions:
  contents: write

jobs:
  check-userlist-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # 使用默认的 GITHUB_TOKEN，已通过 permissions 获得写入权限
          persist-credentials: true
          fetch-depth: 0
        
      - name: 安装依赖并运行脚本
        run: |
          pip install beautifulsoup4 requests
          python ssb.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          DOMAIN="||$(curl -s https://sxsy.org/ | grep -oP '(?<=尚香书苑：<a href=")https[^"]+' | sed 's#https://##')"
          sed -i "5c$DOMAIN" userlist.txt
          
          git add userlist.txt
          git diff --quiet && git diff --staged --quiet || git commit -m "Update xin_Discuz.js match URL"
          git push
          
